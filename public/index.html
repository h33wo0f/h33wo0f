<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>희멍's Visitor Log 🍓</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink-50:  #fff5f8;
  --pink-100: #ffe4ed;
  --pink-200: #ffd1dc;
  --pink-300: #ffb6c1;
  --pink-400: #ff8fa8;
  --pink-500: #ff6b8a;
  --pink-700: #d4566f;
  --pink-900: #5a3d4a;
}

body {
  font-family: 'Galmuri11', monospace;
  font-size: 11px;
  background: var(--pink-50);
  background-image: radial-gradient(var(--pink-200) 1.5px, transparent 1.5px);
  background-size: 14px 14px;
  color: var(--pink-900);
  padding: 20px;
  min-height: 100vh;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: none;
}

.container {
  max-width: 760px;
  margin: 0 auto;
  background: #ffffff;
  border: 3px solid var(--pink-700);
  box-shadow: 6px 6px 0 var(--pink-700);
  padding: 24px;
}

header { text-align: center; margin-bottom: 18px; }

h1 {
  font-family: 'Galmuri14', 'Galmuri11', monospace;
  font-size: 28px;
  color: var(--pink-700);
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.subtitle {
  font-family: 'Galmuri14', 'Galmuri11', monospace;
  font-size: 14px;
  color: var(--pink-700);
  opacity: 0.75;
  letter-spacing: 2px;
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

@media (min-width: 600px) {
  .stats-row {
    grid-template-columns: 1.4fr 3.6fr;
    align-items: stretch;
  }
}

.today-card {
  background: var(--pink-400);
  border: 3px solid var(--pink-700);
  box-shadow: 4px 4px 0 var(--pink-700);
  padding: 22px 14px;
  text-align: center;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.today-card .label {
  font-family: 'Galmuri14', 'Galmuri11', monospace;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.95;
}

.today-card .count {
  font-family: 'Galmuri14', 'Galmuri11', monospace;
  font-size: 56px;
  line-height: 1.05;
  margin: 8px 0 6px;
  text-shadow: 3px 3px 0 var(--pink-700);
}

.today-card .sub { font-size: 11px; opacity: 0.95; }

.others {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.stat {
  background: var(--pink-50);
  border: 2px solid var(--pink-300);
  box-shadow: 3px 3px 0 var(--pink-300);
  padding: 14px 6px;
  text-align: center;
  transition: transform 0.1s steps(2);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
}

.stat:hover {
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--pink-300);
}

.stat-label {
  font-size: 11px;
  color: var(--pink-700);
  letter-spacing: 1px;
  white-space: nowrap;
}

.stat-value {
  font-family: 'Galmuri11', monospace;
  font-size: 22px;
  color: var(--pink-700);
  line-height: 1;
}

.graph-section {
  background: var(--pink-50);
  border: 2px solid var(--pink-300);
  box-shadow: 3px 3px 0 var(--pink-300);
  padding: 16px;
  margin-bottom: 14px;
}

.graph-title {
  font-family: 'Galmuri14', 'Galmuri11', monospace;
  font-size: 14px;
  color: var(--pink-700);
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.graph-title .legend { font-size: 11px; opacity: 0.7; font-family: 'Galmuri11', monospace; }

.graph-svg {
  width: 100%;
  height: 90px;
  display: block;
}

.graph-legend {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--pink-700);
  opacity: 0.7;
  margin-top: 8px;
  letter-spacing: 1px;
}

.legend-scale {
  display: flex;
  gap: 2px;
}

.legend-scale span {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 2px;
}

footer {
  text-align: center;
  font-size: 11px;
  color: var(--pink-700);
  opacity: 0.6;
  letter-spacing: 1px;
}

.loading { opacity: 0.4; }
.error { color: #c4756e !important; }

@media (max-width: 520px) {
  .others { grid-template-columns: repeat(3, 1fr); }
  h1 { font-size: 22px; }
  .today-card .count { font-size: 44px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🍓 어서오세요! 🐾</h1>
    <div class="subtitle">★ VISITOR LOG ★</div>
  </header>

  <div class="stats-row">
    <div class="today-card">
      <div class="label">TODAY</div>
      <div class="count loading" id="today">0</div>
      <div class="sub" id="message">로딩 중...</div>
    </div>

    <div class="others">
      <div class="stat">
        <div class="stat-label">YESTERDAY</div>
        <div class="stat-value" id="yesterday">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">THIS WEEK</div>
        <div class="stat-value" id="thisWeek">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">LAST WEEK</div>
        <div class="stat-value" id="lastWeek">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">THIS MONTH</div>
        <div class="stat-value" id="thisMonth">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">LAST MONTH</div>
        <div class="stat-value" id="lastMonth">-</div>
      </div>
    </div>
  </div>

  <div class="graph-section">
    <div class="graph-title">
      <span>♥ LAST 14 DAYS</span>
      <span class="legend" id="graph-max">max: -</span>
    </div>
    <svg class="graph-svg" id="graph-svg" viewBox="0 0 280 80" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="graph-legend">
      <span>less</span>
      <span class="legend-scale">
        <span style="background:#ffe4ed"></span>
        <span style="background:#ffd1dc"></span>
        <span style="background:#ffb6c1"></span>
        <span style="background:#ff8fa8"></span>
        <span style="background:#ff6b8a"></span>
      </span>
      <span>more</span>
    </div>
  </div>

  <footer>★ 🍓 FOR HEEWOOF ★</footer>
</div>

<script>
function renderGraph(daily) {
  if (!daily || !daily.length) return;
  const max = Math.max(...daily.map(d => d.count), 1);
  document.getElementById('graph-max').textContent = `max: ${max}`;

  const W = 280, H = 80;
  const padX = 4, padY = 4;
  const gap = 4;
  const cols = 7, rows = 2;
  const cellW = (W - padX*2 - gap*(cols-1)) / cols;
  const cellH = (H - padY*2 - gap*(rows-1)) / rows;

  function colorFor(count) {
    if (count === 0) return '#ffe4ed';
    const t = max === 0 ? 0 : count / max;
    if (t <= 0.25) return '#ffd1dc';
    if (t <= 0.5)  return '#ffb6c1';
    if (t <= 0.75) return '#ff8fa8';
    return '#ff6b8a';
  }

  const cells = daily.map((d, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = padX + col * (cellW + gap);
    const y = padY + row * (cellH + gap);
    const isToday = i === daily.length - 1;
    const stroke = isToday ? '#d4566f' : 'none';
    const sw = isToday ? 2 : 0;
    return `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${cellW.toFixed(2)}" height="${cellH.toFixed(2)}" fill="${colorFor(d.count)}" stroke="${stroke}" stroke-width="${sw}" vector-effect="non-scaling-stroke" rx="3"><title>${d.date}: ${d.count}</title></rect>`;
  }).join('');

  document.getElementById('graph-svg').innerHTML = cells;
}

async function loadStats() {
  try {
    const res = await fetch('/api/hit', { cache: 'no-store' });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    document.getElementById('today').textContent = data.today.toLocaleString();
    document.getElementById('today').classList.remove('loading');
    document.getElementById('yesterday').textContent = data.yesterday.toLocaleString();
    document.getElementById('thisWeek').textContent = data.thisWeek.toLocaleString();
    document.getElementById('lastWeek').textContent = data.lastWeek.toLocaleString();
    document.getElementById('thisMonth').textContent = data.thisMonth.toLocaleString();
    document.getElementById('lastMonth').textContent = data.lastMonth.toLocaleString();

    const msg = document.getElementById('message');
    if (data.today === 0) msg.textContent = '아직 발자국 없음 🌱';
    else if (data.today === 1) msg.textContent = '1명이 다녀갔어요 🍓';
    else msg.textContent = `${data.today}명이 다녀갔어요 🍓`;

    if (data.daily) renderGraph(data.daily);
  } catch (e) {
    const today = document.getElementById('today');
    today.classList.remove('loading');
    today.classList.add('error');
    document.getElementById('message').textContent = '연결 실패 😢';
  }
}

loadStats();
</script>
</body>
</html>
